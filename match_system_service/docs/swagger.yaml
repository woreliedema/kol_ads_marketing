basePath: /
definitions:
  model.BrandFilterResp:
    properties:
      list:
        items:
          $ref: '#/definitions/model.BrandSyncData'
        type: array
      total:
        type: integer
    type: object
  model.BrandSyncData:
    properties:
      avatar_url:
        description: 对应 brand_profiles.avatar_url
        type: string
      brand_user_id:
        description: 对应 sys_users.id
        type: integer
      company_name:
        type: string
      industry:
        type: string
      is_verified:
        description: 1-是 0-否
        type: integer
      username:
        type: string
    type: object
  model.KolFilterResp:
    properties:
      list:
        items:
          $ref: '#/definitions/model.KolSyncData'
        type: array
      total:
        type: integer
    type: object
  model.KolSyncData:
    properties:
      avatar_url:
        type: string
      base_quote:
        type: number
      credit_score:
        type: integer
      fans_count:
        type: integer
      platform:
        type: string
      platform_uid:
        type: string
      real_name:
        type: string
      tags:
        items:
          type: string
        type: array
      user_id:
        type: integer
    type: object
  response.Response:
    properties:
      code:
        description: 业务状态码 (非HTTP状态码，例如 0 表示成功，40001 表示参数错误)
        type: integer
      data:
        description: 实际的业务数据载荷 (如果没有数据，最好返回空结构体或 nil)
      message:
        description: 给前端展示或排查问题的提示语
        type: string
    type: object
host: localhost:8082
info:
  contact: {}
  description: 匹配系统接口文档，提供红人筛选、需求解析、受众重合度匹配等核心能力。
  title: 匹配系统微服务 API (Match System Service)
  version: "1.0"
paths:
  /api/v1/match/brand/filter:
    get:
      consumes:
      - application/json
      description: 根据所属行业、认证状态等维度筛选潜在合作的品牌方 (对标B站花火“找品牌”功能)
      parameters:
      - description: 所属行业标签，如'数码'
        in: query
        name: industry
        type: string
      - description: '是否已认证: 1-已认证, 0-未认证'
        in: query
        name: is_verified
        type: integer
      - description: 页码，默认1
        in: query
        name: page
        type: integer
      - description: 每页数量，默认20
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回品牌方列表
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.BrandFilterResp'
              type: object
        "400":
          description: 参数解析失败
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Token无效或已过期
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 权限不足，仅限红人调用
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 系统检索异常
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - ApiKeyAuth: []
      summary: 红人按条件筛选品牌方
      tags:
      - KOL匹配系统
  /api/v1/match/kol/filter:
    get:
      consumes:
      - application/json
      description: 根据领域标签、粉丝量级、价格区间等多维度筛选红人列表 (对标B站花火“找红人”功能)
      parameters:
      - description: 领域标签，如'美妆'
        in: query
        name: field_tag
        type: string
      - description: 粉丝量级，格式'min,max'，如'10000,100000'
        in: query
        name: fan_level
        type: string
      - description: 最低报价限制
        in: query
        name: price_min
        type: integer
      - description: 最高报价限制
        in: query
        name: price_max
        type: integer
      - description: 页码，默认1
        in: query
        name: page
        type: integer
      - description: 每页数量，默认20
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回红人列表及总数
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.KolFilterResp'
              type: object
        "400":
          description: 参数解析失败
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Token无效或已过期
          schema:
            $ref: '#/definitions/response.Response'
        "403":
          description: 权限不足，仅限品牌方调用
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 系统检索异常
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - ApiKeyAuth: []
      summary: 品牌方按标签筛选红人
      tags:
      - KOL匹配系统
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
