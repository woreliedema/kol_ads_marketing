server {
    listen       80;
    server_name  localhost;

    # 1. 基础配置与性能优化
    # 开启 gzip 压缩，极大提升生产环境加载速度
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript image/jpeg image/gif image/png application/json;
    gzip_vary on;

    # 2. 静态资源托管与 SPA 路由劫持
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;

        # 核心指令：如果找不到对应路径的文件，就 fallback 到 index.html
        # 让 React Router 的 JS 代码去接管路由渲染
        try_files $uri $uri/ /index.html;
    }

    # 3. 反向代理集群 (替代 vite.config.ts 的 proxy)
    # 🚨 注意：这里的 target 全部换成了对应的 Docker 容器名

    # 代理到用户中心 (Go: 8081)
    location /api/v1/auth/ {
        proxy_pass http://kol_user_center:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/user/ {
        proxy_pass http://kol_user_center:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /uploads/ {
        proxy_pass http://kol_user_center:8081;
        proxy_set_header Host $host;
    }

    # 代理到数据采集微服务 (Python: 8000)
    location /api/v1/crawler/ {
        proxy_pass http://data_collection_service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 代理到匹配系统微服务 (Go: 8082)
    location /api/v1/match/ {
        proxy_pass http://kol_match_system:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 代理到数据监控微服务 (Go: 8083)
    location /api/v1/monitor/ {
        proxy_pass http://kol_data_monitor:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 4. WebSocket 专属通道升级
    location /ws/ {
        proxy_pass http://kol_match_system:8082; # 假设 IM 走的是匹配服务
        # 协议升级核心配置，必须有这两行才能建立 WS 连接
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s; # 防止长连接因为没心跳被 Nginx 掐断
    }
}