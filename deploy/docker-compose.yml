services:
  backend_service:
    # 构建上下文：指向项目根目录 (根据 docker-compose.yml 所在位置，如果是 deploy 目录，则根目录是上一级)
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: data_collection_service
    restart: always
    ports:
      - "8000:8000"  # 映射 FastAPI 端口
    environment:
      # 关键配置：让 Python 代码知道 Redis 的主机名是 'redis' (对应下方的服务名)
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NACOS_HOST=nacos  # [新增] 确保代码能读到这个 host
      - NACOS_PORT=8848
      # 数据库连接信息 (根据您的 settings 修改)
      - MYSQL_HOST=mysql
      - CLICKHOUSE_HOST=clickhouse
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - DATA_COLLECTION_IP=data_collection_service
    depends_on:
      - redis
      - mysql
      - clickhouse
      - nacos
      - kafka
    volumes:
      # 挂载代码目录，方便调试（可选）
      - ../data_collection_service:/app/data_collection_service
      # 挂载日志目录
      - ./logs:/app/logs
  user_center:
    build:
      context: ../user_center
      dockerfile: Dockerfile
    container_name: kol_user_center
    restart: always
    ports:
      - "8081:8081"
    environment:
      # 1. 替换基础组件地址为容器名
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - NACOS_HOST=nacos
      # 2. 匹配你代码里读取的数据库变量名
      - MYSQL_UC_DBNAME=kol_user_center
      # 3. 让 Go 服务向 Nacos 注册自己的容器名，而不是 127.0.0.1
      - USER_CENTER_IP=kol_user_center
      - USER_CENTER_NAME=user-center-service
      # 4. 强制复用 .env 里的密码配置 (可以通过 docker-compose 的变量插值传递)
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    depends_on:
      - mysql
      - redis
      - nacos
  # 关系型数据库：存储核心结构化数据
  mysql:
    image: mysql:8.0
    container_name: mysql_8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: KOL_platform
    ports:
      - "3306:3306"
    volumes:
      # 修改点：使用具名卷mysql_data
      - mysql_data:/var/lib/mysql
#      - ./data/mysql:/var/lib/mysql

  # 缓存层：支持高并发报价结果缓存
  redis:
    image: redis:7.0
    container_name: redis_7.0
    restart: always
    ports:
      - "6379:6379"

  # 非关系型数据库：存储各平台差异化的红人字段
  mongodb:
    image: mongo:6.0
    container_name: mongodb_6.0
    restart: always
    ports:
      - "27017:27017"
    volumes:
      # 修改点：使用具名卷 mongo_data
      - mongo_data:/data/db
#      - ./data/mongo:/data/db

  # 时序数据库：存储视频播放/互动监控数据
  clickhouse:
    image: clickhouse/clickhouse-server:23.8.16.16
    container_name: clickhouse_23.8
    restart: always
    environment:
      # 设置默认账户名为 admin
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      # 设置您自定义的密码
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      # 允许管理权限（可选，方便后续在DBeaver中管理用户）
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      # 修改点：使用具名卷 clickhouse_data
      - clickhouse_data:/var/lib/clickhouse
#      - ./data/clickhouse:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # 消息队列：处理异步数据采集与通知
  zookeeper:
    image: zookeeper:3.9.1
    container_name: zookeeper_3.9.1
    restart: always
    environment:
      - ZOO_ENABLE_AUTH=no
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0  # Confluent Kafka的稳定版本
    container_name: kafka_7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
#      - KAFKA_ZOOKEEPER_CONNECT=zookeeper_3.9.1:2181 # 匹配Zookeeper的容器名（若有修改需对应）
#      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_BROKER_ID=1
      # 开启双通道监听
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_LISTENERS=INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      # 内部微服务用 kafka:29092，外部宿主机用 localhost:9092
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1  # 单机环境副本数设为1

  # 服务注册与配置中心：Hertz 微服务体系的核心
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: nacos_server
    environment:
      - MODE=standalone # 开发环境使用单机模式
      - NACOS_AUTH_ENABLE=false # 显示关闭鉴权，解决 NACOS_AUTH_TOKEN 报错问题
    ports:
      - "8848:8848"
      - "9848:9848" # Hertz/Go 客户端通信所需端口
  # 搜索引擎：用于匹配系统微服务的红人标签多路召回与向量检索
  elasticsearch:
    image: elasticsearch:8.0.0
    container_name: elasticsearch_8.0
    restart: always
    environment:
      - discovery.type=single-node        # 指定为单节点运行模式，跳过集群引导检查
      - xpack.security.enabled=false      # 本地开发环境关闭密码鉴权，方便微服务免密调用
      - xpack.security.http.ssl.enabled=false # 关闭 HTTPS 强制验证
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"  # 限制 JVM 内存占用（ES默认占用较高，限制为512M防止撑爆本地内存）
    ports:
      - "9200:9200"  # RESTful API 端口（微服务与ES交互走这个）
      - "9300:9300"  # 节点间通信端口（虽然单节点但也建议暴露）
    volumes:
      # 使用具名卷 es_data 持久化索引数据
      - es_data:/usr/share/elasticsearch/data
volumes:
  mysql_data:
  mongo_data:
  clickhouse_data:
  es_data:
  # redis_data: