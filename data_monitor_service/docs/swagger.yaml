basePath: /api/v1/monitor
definitions:
  model.AdVideoItem:
    properties:
      brand_name:
        type: string
      bvid:
        type: string
      insert_time:
        type: string
      product_name:
        type: string
      selling_points:
        description: 自动解析 ClickHouse 的 Array(String)
        items:
          type: string
        type: array
      title:
        type: string
    type: object
  model.AdsAnalysisDTO:
    properties:
      brand_distribution:
        description: 品牌偏好
        items:
          $ref: '#/definitions/model.BrandCount'
        type: array
      mid:
        type: integer
      recent_videos:
        description: 视频列表
        items:
          $ref: '#/definitions/model.AdVideoItem'
        type: array
      top_selling_points:
        description: 核心带货卖点
        items:
          $ref: '#/definitions/model.PointCount'
        type: array
      total_ads_30d:
        description: 近30天商单总数
        type: integer
    type: object
  model.BrandCount:
    properties:
      brand_name:
        type: string
      count:
        type: integer
    type: object
  model.ChartSeries:
    properties:
      data:
        description: 对应 30/90/180/365 的数据数组
        items:
          type: number
        type: array
      name:
        description: '图例名称 (如: "平均播放量")'
        type: string
      smooth:
        description: 是否平滑曲线
        type: boolean
      type:
        description: '图表类型 (如: "line", "bar")'
        type: string
    type: object
  model.KOLOverviewDTO:
    properties:
      avg_view_30d:
        type: number
      engagement_rate:
        description: 衍生计算指标
        type: number
      median_view_30d:
        type: number
      mid:
        type: integer
      radar:
        allOf:
        - $ref: '#/definitions/model.RadarScoreDTO'
        description: 雷达图数据挂载点
      stability_ratio:
        description: 衍生计算指标
        type: number
      stat_date:
        type: string
      video_count_30d:
        type: integer
    type: object
  model.PointCount:
    properties:
      count:
        type: integer
      point:
        type: string
    type: object
  model.RadarScoreDTO:
    properties:
      active_score:
        description: 活跃度(基于发稿频率)
        type: number
      interact_score:
        description: 互动性(基于整体互动率)
        type: number
      loyalty_score:
        description: 铁粉度(基于投币率)
        type: number
      planting_score:
        description: 种草力(基于收藏率)
        type: number
      spread_score:
        description: 传播力(基于均播)
        type: number
      stable_score:
        description: 稳定性(基于中位数/均值的比值)
        type: number
    type: object
  model.TrendChartDTO:
    properties:
      categories:
        description: 'X轴坐标: ["近30天", "近90天", "近180天", "近一年"]'
        items:
          type: string
        type: array
      mid:
        type: integer
      series:
        description: Y轴数据列
        items:
          $ref: '#/definitions/model.ChartSeries'
        type: array
    type: object
  response.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
host: localhost:8083
info:
  contact: {}
  description: Data Monitor Microservice API Docs. 负责提供 KOL 核心数据大盘与 AI 洞察分析。
  title: KOL 营销平台 - 数据监控大脑 API
  version: "1.0"
paths:
  /dashboard/ads_analysis:
    get:
      consumes:
      - application/json
      description: 提取包含品牌偏好饼图、卖点词云及视频明细的大盘数据。
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回商单分析数据
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.AdsAnalysisDTO'
              type: object
      security:
      - ApiKeyAuth: []
      summary: 获取 KOL 近30天商单 AI 分析结果
      tags:
      - Dashboard 大盘数据
  /dashboard/overview:
    get:
      consumes:
      - application/json
      description: 结合 Redis 缓存，毫秒级获取指定 KOL 近30天的均播、中位数以及互动率等基础大盘数据。
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回大盘数据
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.KOLOverviewDTO'
              type: object
      security:
      - ApiKeyAuth: []
      summary: 获取 KOL 数据大盘核心概览指标
      tags:
      - Dashboard 大盘数据
  /dashboard/trend:
    get:
      consumes:
      - application/json
      description: 返回前端 ECharts 能够直接渲染的 Category 和 Series 格式数据。
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回趋势数据
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.TrendChartDTO'
              type: object
      security:
      - ApiKeyAuth: []
      summary: 获取 KOL 数据大盘的时间窗口趋势图(折线图)
      tags:
      - Dashboard 大盘数据
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
